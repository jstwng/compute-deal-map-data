description: >-
  Constellation Energy, the largest U.S. nuclear power company, completed its
  acquisition of Calpine Corporation in January 2026 - a ~$16.4B
  stock-and-cash deal announced Jan 2025 - adding Calpine's gas and geothermal
  fleet to Constellation's 26-reactor nuclear portfolio. FERC required
  divestment of four plants. The deal fortifies Constellation's ability to
  supply data-center PPAs (Meta/Clinton, Microsoft/TMI).
