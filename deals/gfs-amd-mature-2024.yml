description: >-
  GlobalFoundries supplies AMD with 12nm/14nm IOD (I/O Die) chiplets for EPYC
  and Ryzen processors via a Wafer Supply Agreement extended through 2028.
  Original WSA dates to AMD's 2009 spin-out of GlobalFoundries; current pact
  covers ~$2B+ annual minimum purchase commitments. Ensures GF's leading
  mature-node FinFET capacity.
