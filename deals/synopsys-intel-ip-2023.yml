description: >-
  Intel and Synopsys signed a definitive multi-generational agreement to develop
  Synopsys IP portfolios on Intel 3 and Intel 18A for Intel Foundry Services
  customers. Synopsys provides AI-driven EDA, implementation and signoff flows
  optimized for SoC and multi-die designs on Intel's advanced nodes -- a central
  pillar of Intel's IDM 2.0 foundry push. Extended to Intel 18A-P in 2025.
