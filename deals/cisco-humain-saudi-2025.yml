description: >-
  AMD and Cisco formed a joint venture with Saudi state-backed Humain to
  deliver 1 GW of AI infrastructure in Saudi Arabia by 2030. AMD supplies
  Instinct MI450 Series GPUs; Cisco provides AI networking fabric. First
  100 MW phase targeted for Riyadh/Dammam sites in Q2 2026. Builds on
  Humain's earlier $10B AMD deal (May 2025) and Cisco partnership, backed by
  PIF's ambition for 6.6 GW of data-center capacity by 2035.
