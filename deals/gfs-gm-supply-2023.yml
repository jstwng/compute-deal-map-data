description: >-
  GlobalFoundries and General Motors announced a strategic long-term direct
  supply agreement establishing a dedicated US capacity corridor for GM's chip
  supply, with chips manufactured at GF's Malta, New York fab. First-of-its-kind
  auto-to-foundry deal aims to reduce GM's chip SKU count and secure resilient
  US-based supply for increasingly technology-laden vehicles. (Note: GM not in
  this dataset; mapped to "multiple" as downstream customer.)
