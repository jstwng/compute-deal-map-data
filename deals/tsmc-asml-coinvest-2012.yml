description: >-
  TSMC joined ASML's Customer Co-Investment Program, taking a 5% equity stake
  for €838M ($1.05B) and committing an additional €276M over five years to
  ASML's R&D for EUV and 450mm wafer technology. Shares issued Oct 31, 2012 via
  Dutch foundation (20,992,625 shares, 2.5-year lock-up). Aimed at accelerating
  EUV industrialization.
