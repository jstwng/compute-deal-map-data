description: >-
  NVIDIA announced plans to invest up to $100B in OpenAI, with funds disbursed
  in 10 installments tied to each gigawatt of Vera Rubin-based AI capacity
  brought online starting 2H2026, totaling 10 GW. OpenAI would deploy the
  investment back into NVIDIA systems. The first gigawatt is targeted for
  2H2026. (Later reports indicated final structure remained in flux at YE2025.)
