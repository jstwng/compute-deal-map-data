description: >-
  NVIDIA named Crusoe as a launch NVIDIA Cloud Partner (NCP) for DGX Cloud
  Lepton at Computex 2025, alongside CoreWeave, Firmus, Foxconn, GMI Cloud,
  Lambda, Nebius, Nscale, SoftBank, and Yotta. NCPs offer NVIDIA Blackwell and
  other architecture GPUs through Lepton's compute marketplace, formalizing
  Crusoe's role as a primary NVIDIA-GPU cloud supplier for agentic and
  physical AI workloads.
