description: >-
  Google launched Cloud TPU v5e at Cloud Next 2023 -- 2.3x price-performance vs
  v4 for LLM training, optimized for inference at half the cost. Co-designed
  with Broadcom on TSMC N5. Anthropic used v5e to serve Claude; Bard team used
  it for training. v5p (full training variant) followed in Dec 2023. Predecessor
  to TPU v6 Trillium and v7 Ironwood.
