description: >-
  Nscale signed a multi-billion-dollar deal with Microsoft to deliver up to
  200,000 NVIDIA GB300 GPUs across the US, UK, Europe starting 2026. Largest
  allocation is 104,000 GB300s at a Texas hyperscale AI campus (240 MW
  initial, expanding to 1.2 GW) leased from Ionic Digital, with Q3 2026
  delivery. Portugal Start AI campus gets 12,600 GPUs, Norway Narvik JV ~52K
  GB300s, and Loughton UK ~23K GB300s by Q1 2027.
