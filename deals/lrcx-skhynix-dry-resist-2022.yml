description: >-
  SK Hynix chose Lam Research's dry photoresist EUV patterning technology for
  its next-generation DRAM production, including HBM core dies. The dry-resist
  approach enables low-defect, lower-cost EUV patterning critical for 1a/1b
  DRAM scaling. SK Hynix became a lead adopter and ongoing partner on
  follow-on dry resist nodes for HBM3E and HBM4.
