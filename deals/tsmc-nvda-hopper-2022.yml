description: >-
  NVIDIA H100 Hopper launched on TSMC's custom 4N process (optimized N4 variant)
  -- 80B transistors, 814 mm2. First NVIDIA datacenter GPU on TSMC N4 and the
  foundational node for the 2023-2024 generative AI buildout (Microsoft, Google,
  Meta, CoreWeave all ran H100-dominated fleets). Relationship later expanded
  to Blackwell on N4P and Rubin on N3.
