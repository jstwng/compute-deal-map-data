description: >-
  Musk confirmed xAI's purchase of a third Memphis building to expand Colossus
  to ~2 GW total site capacity, housing roughly 555,000 NVIDIA GPUs ordered for
  approximately $18B -- making it the world's largest single-site AI training
  installation. The expansion (branded Colossus 2) builds on the original 100K
  H100 cluster brought online in Sep 2024 and the 200K-GPU upgrade that
  followed. Paired with on-site natural-gas generation (~460 MW) to bridge grid
  constraints.
