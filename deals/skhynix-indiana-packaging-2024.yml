description: >-
  SK Hynix announced a $3.87B advanced-packaging plant in West Lafayette,
  Indiana to stack HBM for AI GPUs, its first U.S. manufacturing site and the
  first large overseas back-end fab. Aimed at co-locating HBM stacking near
  U.S. customers (NVIDIA, AMD, hyperscalers). Later expanded with Cheongju
  P&T7 in 2026 to form a Cheongju-Icheon-Indiana "packaging triangle."
