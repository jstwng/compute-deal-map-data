description: >-
  Dell and NVIDIA launched the "Dell AI Factory with NVIDIA" at Dell Technologies
  World 2024 -- a full-stack AI server portfolio spanning PowerEdge XE9680 (H100),
  XE7745 (Spectrum-X), and upcoming GB200 NVL4 systems. Jensen Huang appeared on
  stage with Michael Dell. Dell projected ~$15B in AI server sales for FY2026
  (ending Feb 2026), making it NVIDIA's largest OEM partner by revenue.
