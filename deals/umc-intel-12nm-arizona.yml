description: >-
  UMC and Intel announced a joint 12 nm FinFET process to be installed in
  Intel's Fabs 12, 22, and 32 at the Ocotillo site in Chandler, Arizona.
  Targets communications, networking, and specialty chips. UMC engineers are
  embedded in Intel's ecosystem; UMC committed NT$15.6B (~$490M) in 2024 R&D
  largely supporting the project. Step toward Intel's goal of becoming the
  world's second-largest foundry by 2030.
