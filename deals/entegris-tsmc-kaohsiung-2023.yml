description: >-
  Entegris opened its Kaohsiung, Taiwan manufacturing facility - a 54,000 sqm
  site that is Entegris' largest plant in the world - to supply TSMC and other
  Taiwanese foundries with specialty chemicals, CMP slurries, advanced
  deposition materials, liquid filtration, and gas purification products.
  Entegris is one of only two global photomask pod suppliers and a critical
  TSMC supply-chain partner.
