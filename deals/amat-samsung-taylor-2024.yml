description: >-
  Applied Materials is a primary equipment supplier to Samsung's $17B+ Taylor,
  Texas fab, which received $6.4B in direct CHIPS Act funding in April 2024 to
  build 2nm gate-all-around logic capacity. AMAT provides deposition, etch,
  implant, CMP, and thermal processing platforms for GAA transistor integration
  alongside fellow suppliers ASML, Lam, KLA, and Tokyo Electron. Tesla is the
  fab's first major chip customer via a $16.5B contract.
