description: >-
  At IFS Direct Connect 2024, Satya Nadella announced Microsoft had selected a
  chip design to produce on Intel's 18A process -- Intel Foundry's highest-profile
  18A customer win alongside internal Intel products and the US DoD RAMP-C
  program. Tom's Hardware pegged the program at roughly $15B over its lifetime.
  Anchors Microsoft's custom-silicon roadmap (Maia, Cobalt) on a second advanced
  foundry alongside TSMC.
