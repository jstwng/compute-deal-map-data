description: >-
  NVIDIA and Saudi Arabia's PIF-backed Humain announced a partnership to deploy
  up to 500 MW of AI factories powered by "several hundred thousand" NVIDIA
  GPUs over five years. Expanded in November 2025 to "up to 600,000 of NVIDIA's
  latest AI infrastructure technologies over three years" following U.S.
  Commerce approval of advanced chip exports to Humain. Kingdom's sovereign AI
  infrastructure program, positioned alongside Oracle/Cisco/AMD deals.
