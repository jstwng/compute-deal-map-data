description: >-
  Applied Digital finalized a third 150 MW lease agreement with CoreWeave at
  its Polaris Forge 1 campus in Ellendale, North Dakota, bringing total
  contracted lease revenue from CoreWeave to ~$11B across 400 MW of critical
  IT capacity. This new lease supplements the initial two 15-year, ~$7B
  contracts signed May 2025 and is aligned to CoreWeave's AI/HPC GPU cluster
  buildout.
