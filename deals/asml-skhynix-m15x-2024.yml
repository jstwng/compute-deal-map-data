description: >-
  SK Hynix is spending ~$8B to acquire roughly 20 ASML EUV lithography scanners
  by 2027, doubling its EUV fleet. Equipment will support the $14.6B Cheongju
  M15X fab (HBM-focused) and advance the 1c DRAM process for HBM4E core dies.
  Investment also positions SK Hynix for Yongin Semiconductor Park fab startup
  in 2027.
