description: >-
  Google announced Axion, its first custom Arm-based data-center CPU, at Cloud
  Next 2024. Axion is built on Arm's Neoverse V2 platform under an Arm
  architecture license and claims ~30% better performance than the fastest
  general-purpose Arm VMs in cloud and ~50% better than comparable x86 VMs.
  Completes the hyperscaler triad on Neoverse V2 (AWS Graviton 4, Microsoft
  Cobalt 100, Google Axion) and grows Arm's data-center royalty pool.
