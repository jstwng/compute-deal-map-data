description: >-
  Samsung Foundry manufactured Tesla's HW4 (AI4) FSD SoC on its 7LPP 7nm process
  -- the second generation Tesla FSD chip after HW3 (AI3) on Samsung 14nm (2019).
  Powered Model S/X/3/Y refreshes and Cybertruck through 2025. Direct predecessor
  to the $16.5B 2025 AI5/AI6 contract that moved Tesla silicon to Samsung's
  Taylor TX fab.
