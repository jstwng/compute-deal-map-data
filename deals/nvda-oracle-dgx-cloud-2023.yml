description: >-
  NVIDIA DGX Cloud and NVIDIA AI Enterprise became available through Oracle
  Cloud Marketplace, giving OCI customers access to AI supercomputing via
  existing cloud credits. Oracle was the third DGX Cloud host (after Azure and
  Google Cloud at GTC Mar 2023). OCI also launched bare-metal H100 GPU
  instances alongside the DGX Cloud integration.
