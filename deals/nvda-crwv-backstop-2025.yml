description: >-
  NVIDIA and CoreWeave signed an order form valued at up to $6.3B under which
  NVIDIA will purchase any unused cloud computing capacity from CoreWeave
  through April 2032. The arrangement effectively backstops CoreWeave's GPU
  revenue and gives NVIDIA guaranteed access to CoreWeave's 250,000+ NVIDIA
  GPU fleet for internal research or reallocation to other customers. Extends
  the companies' 2023 services relationship.
