description: >-
  NVIDIA confirmed Samsung's 8nm (8N) custom process for all Ampere consumer
  GPUs -- GA102 (RTX 3090/3080), GA104 (3070), GA106 (3060) -- marking the first
  time NVIDIA's flagship gaming silicon moved off TSMC. Split allocation
  reportedly driven by TSMC 7nm capacity constraints and Samsung's aggressive
  pricing. Datacenter A100 stayed on TSMC 7nm.
