description: >-
  Amkor co-developed the Hybrid-Substrate Cube (H-Cube) 2.5D packaging
  platform with Samsung Electronics and Samsung Electro-Mechanics (SEMCO).
  H-Cube pairs a silicon interposer with a hybrid substrate to stack logic
  chips and HBM in a small form factor with low signal loss, lowering barriers
  to entry for HPC/AI integrated devices in Samsung Foundry's ecosystem.
