description: >-
  Meta signed a 150 MW power purchase agreement with Sage Geosystems for
  geothermal power generation east of the Rocky Mountains, using Sage's
  proprietary Geopressured Geothermal Systems (GGS) - an enhanced geothermal
  approach adapted from oil/gas fracking. Plant targeted to be operational by
  2027 to supply carbon-free baseload to Meta data centers. Part of Meta's
  12,000+ MW clean-energy portfolio.
