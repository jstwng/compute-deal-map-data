description: >-
  Onto Innovation launched enhanced sub-surface defect inspection capability
  for its Dragonfly G3 2D/3D inspection and metrology platform, adopted by HBM
  customers including SK Hynix for die position metrology on stacked dies and
  wafers. The G3's ability to detect yield-impacting defects before subsequent
  process steps is critical for high-volume HBM3E/HBM4 production where TSV
  integrity and stack alignment drive yield.
