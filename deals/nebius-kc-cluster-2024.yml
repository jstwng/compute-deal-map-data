description: >-
  Nebius announced its first U.S.-based GPU cluster in Kansas City, Missouri,
  going live Q1 2025, and opened offices in San Francisco, Dallas, and New
  York. The Kansas City cluster brings Nebius's AI-native cloud services
  closer to its American customer base (which later included Microsoft and
  Meta); expansion followed with nine new data-center sites announced across
  the U.S., France, Israel, and the UK.
