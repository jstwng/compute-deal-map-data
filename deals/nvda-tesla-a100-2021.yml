description: >-
  Tesla disclosed at CVPR 2021 that its Autopilot/FSD neural network training
  cluster ran on 5,760 NVIDIA A100 GPUs (720 nodes of 8x A100) achieving 1.8
  exaflops -- roughly the No. 5 supercomputer in the world at the time. This
  was before Tesla's custom Dojo initiative. NVIDIA's blog confirmed the
  partnership. First NVIDIA-Tesla edge in the graph.
