description: >-
  Brookfield Asset Management, Brookfield Renewable, and Microsoft signed a
  five-year global renewable energy framework targeting delivery of more than
  10.5 GW of new wind and solar capacity across the US and Europe between 2026
  and 2030. Described as the largest-ever corporate renewables procurement;
  supports Microsoft's 100/100/100 clean-energy goal for its AI data-center
  buildout.
