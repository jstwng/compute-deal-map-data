description: >-
  SK Hynix secured customized HBM orders from Broadcom (alongside NVIDIA and
  Microsoft), pulling ahead of Samsung in the race to supply AI-optimized
  memory. Broadcom uses custom HBM as part of its hyperscaler ASIC programs
  (Google TPU, Meta MTIA, OpenAI custom silicon). Marks the shift from
  off-the-shelf HBM to workload-tailored HBM as customized HBM is forecast to
  dominate a $130B market by 2033.
