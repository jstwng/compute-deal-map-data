description: >-
  Intel completed installation of its second ASML Twinscan EXE:5000 High-NA EUV
  lithography system at its Portland (Hillsboro), Oregon D1X facility, making
  Intel the first chipmaker to take delivery of two High-NA systems. Each
  system lists above $300M. Intel originally placed the initial High-NA pilot
  order in 2022, committing to be lead customer alongside TSMC, Samsung, SK
  Hynix, and Micron who later followed.
