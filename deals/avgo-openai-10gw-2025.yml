description: >-
  OpenAI and Broadcom announced a multi-year partnership to co-design and
  deploy 10 gigawatts of custom OpenAI AI accelerators with Broadcom's
  Ethernet-based networking. OpenAI designs the hardware; Broadcom handles
  manufacturing. Racks ship 2H2026 with full deployment by end-2029. Media
  linked a $10B custom AI chip order disclosed by Broadcom in Sep 2025 to this
  OpenAI program.
