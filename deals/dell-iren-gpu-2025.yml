description: >-
  Alongside IREN's $9.7B GPU-cloud contract with Microsoft, IREN agreed to
  purchase ~$5.8B of NVIDIA GB300 GPUs and ancillary equipment from Dell
  Technologies for deployment across its 750 MW Childress, TX campus through
  2026. The deal extends Dell's role as a top AI infrastructure integrator
  for neocloud and hyperscaler customers.
