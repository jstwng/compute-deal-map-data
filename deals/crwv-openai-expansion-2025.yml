description: >-
  CoreWeave expanded its data-center capacity agreement with OpenAI by up to
  $6.5B, bringing total contract value to ~$22.4B after initial $11.9B in Mar
  2025 and a $4B top-up in May. Contract covers multi-year GPU cloud capacity
  to train and serve OpenAI's frontier models, complementing OpenAI's parallel
  Oracle ($300B) and NVIDIA ($100B) compute arrangements.
