description: >-
  Intel Foundry Services and Cadence signed a multiyear strategic agreement to
  jointly develop customized IP, design flows, and techniques for Intel 18A
  (RibbonFET gate-all-around, PowerVia backside power). Cadence later
  announced a complete EMIB 2.5D advanced-packaging flow plus digital and
  custom/analog flows for Intel 18A in June 2024. Opens the second EDA stack
  (alongside Synopsys) for Intel Foundry customers designing AI, HPC, and
  mobile SoCs.
