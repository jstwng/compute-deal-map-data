description: >-
  Intel Foundry Services and Tower Semiconductor signed a foundry agreement
  where Intel provides 300mm manufacturing capacity at Fab 11X in Rio Rancho,
  New Mexico for Tower's 65nm power management BCD flows. Tower invests up to
  $300M in equipment and fixed assets, unlocking a new capacity corridor of
  600,000+ photo layers per month for Tower's specialty analog business.
