description: >-
  Google unveiled Ironwood (TPU v7) at Cloud Next 2025 -- 7th-gen TPU optimized
  for inference, ~700mm2 primary die on TSMC N3, 5x training and inference perf
  vs TPU v5p, 2x perf/watt vs Trillium (v6). Broadcom co-designed. Scales to
  9,216 chips per pod. Third Broadcom-Google TPU generation in the graph
  (after v4 on N7 and v5e on N5).
