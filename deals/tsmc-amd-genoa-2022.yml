description: >-
  AMD launched 4th-gen EPYC Genoa (Zen 4) on TSMC N5 for the CCDs, with N6 IOD --
  up to 96 cores, first DDR5/PCIe 5 server CPU. TSMC N5 also powered Zen 4
  Ryzen and the later Zen 4c Bergamo (128 cores). Cemented AMD's multi-year
  datacenter CPU ramp against Intel and set the foundation for MI300 (N5/N6)
  and MI350 (N4P) AI accelerators.
