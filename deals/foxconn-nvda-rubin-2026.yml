description: >-
  At NVIDIA GTC 2026, Foxconn confirmed it is the lead manufacturing partner
  for NVIDIA's Vera Rubin NVL72 MGX-generation open-architecture rack servers,
  with mass production targeted for H2 2026. Foxconn is also building
  Kaohsiung-1, a 40 MW Taiwan AI data center running 800 VDC power distribution
  spec'd for Rubin-class racks. Extends the Foxconn-NVIDIA Blackwell GB200
  partnership into the next platform generation and cements Foxconn as the
  largest NVIDIA AI-server ODM.
