description: >-
  Groq partnered with Aramco Digital to build the world's largest AI
  inferencing cluster using Groq LPUs in Saudi Arabia, processing billions
  of tokens/day by end-2024 and scaling to hundreds of billions by 2025. The
  facility targets AI inference capacity for regional developers. Aramco
  Digital later rolled under Humain (Saudi's PIF-backed AI champion launched
  May 2025), positioning Groq as anchor inference provider across Gulf
  Cooperation Council markets.
