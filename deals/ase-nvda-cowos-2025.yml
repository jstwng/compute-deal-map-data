description: >-
  NVIDIA enlisted ASE and Amkor as non-TSMC outsourced packaging partners for
  80,000 CoWoS-equivalent advanced-packaging wafers in 2026, part of its total
  ~595,000 CoWoS wafer booking (~60% of 2026 global demand). ASE participates
  in fan-out and CoWoS-backend steps to de-risk TSMC's capacity bottleneck,
  supporting Rubin AI chips, Vera CPUs, and GB100 class products.
