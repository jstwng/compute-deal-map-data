description: >-
  Oracle selected Arista EOS-based switches for its OCI AI back-end training
  network. Arista's Cluster Load Balancing (CLB) - an Ethernet-based
  RDMA-aware AI load-balancing feature on 7060X6/X5 switches - helps OCI
  avoid flow contentions and increase throughput across ML networks. OCI is
  the back-end compute layer for OpenAI Stargate and enterprise AI workloads.
