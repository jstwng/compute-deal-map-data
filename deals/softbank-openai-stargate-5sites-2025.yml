description: >-
  OpenAI, Oracle, and SoftBank announced five new U.S. Stargate sites on
  Sep 23, 2025. SoftBank's share: Lordstown, Ohio (advanced-design DC already
  under construction, operational 2026) and Milam County, Texas (SB Energy
  fast-build powered-infrastructure site). Oracle leads the other three
  (Shackelford TX, Doña Ana NM, Midwest). Combined with Abilene and Crusoe
  work, total Stargate planned capacity hits ~7 GW and $400B+ through 2028 --
  on track for the $500B / 10 GW full commitment. Distinct from SoftBank's
  Jan 2025 $19B equity contribution to Stargate LLC.
