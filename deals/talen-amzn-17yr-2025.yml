description: >-
  Talen Energy and AWS finalized a restructured 17-year nuclear power purchase
  agreement totaling ~$18B, delivering up to 1,920 MW from the 2.5 GW
  Susquehanna nuclear plant to Amazon's Pennsylvania data centers through 2042.
  Deliveries ramp to 840-1,200 MW by 2029 and 1,680-1,920 MW by 2032. AWS gave
  up its 480 MW cap option. Companies will also explore SMRs on Talen sites.
