description: >-
  Meta deployed Arista's 7700R4 Distributed Etherlink Switch (DES) in its
  Disaggregated Scheduled Fabric (DSF), a multi-tier Ethernet network
  supporting roughly 100,000 DPUs. The 7700R4 behaves as a single system with
  deep buffers for lossless transport across the Ethernet AI fabric, alongside
  Meta's own MiniPack 3 and Cisco 8501 switches. Builds on Meta's earlier
  24,576-GPU H100 Ethernet cluster for Llama 3 training that used Arista 7800
  spines and OCP leaf switches.
