description: >-
  Samsung Electronics and AMD signed a memorandum of understanding to expand
  their strategic memory-supply partnership, under which Samsung will serve as
  a key HBM4 supplier for AMD's upcoming AI GPUs. Follows Samsung's HBM3E
  qualification for AMD's MI350 in 2025 and establishes a second-source HBM4
  path alongside Micron for AMD Instinct accelerators.
