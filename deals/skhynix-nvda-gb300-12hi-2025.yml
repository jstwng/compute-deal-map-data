description: >-
  SK Hynix reportedly locked in an exclusive 12-high HBM3E supply deal with
  NVIDIA for the GB300 Blackwell Ultra platform, which features 288 GB of
  HBM3E per GPU. SK Hynix began HBM3E 8-layer mass production in Mar 2024 and
  12-layer in Sep 2024; Samsung's HBM3E 12-layer qualification was expected
  late May/Jun 2025, and Micron failed to secure initial 12-Hi GB300 orders
  despite completing development in Sep 2024.
