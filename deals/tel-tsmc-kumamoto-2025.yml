description: >-
  Tokyo Electron completed a Y47B (~$314M) Process Development Building at its
  Kumamoto subsidiary (Tokyo Electron Kyushu) to co-develop 1nm-class chip
  equipment alongside TSMC's Kumamoto fabs. The 27,000-sqm facility focuses on
  coater/developers, cleaning systems, and 3D packaging equipment and will
  quadruple TEL's regional development capacity. TEL holds ~88% global share
  in coater/developers.
