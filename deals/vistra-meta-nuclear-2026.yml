description: >-
  Meta signed a 20-year power purchase agreement with Vistra for 2,609 MW of
  carbon-free nuclear power, including uprates at Perry and Davis-Besse (Ohio)
  and Beaver Valley (Pennsylvania). The deal extends operational lifespans by
  up to 20 years via license extensions and is expected to contribute 8-10%
  accretion to Vistra's AFCFbG from operating energy and capacity, with an
  additional 5-7% from uprate capacity at full delivery.
