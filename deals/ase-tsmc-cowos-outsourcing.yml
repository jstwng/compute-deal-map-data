description: >-
  ASE Group (via its SPIL subsidiary) took on back-end CoWoS-S oS
  (on-Substrate) capacity for TSMC alongside Amkor. Industry estimates place
  ASE at 40–50% of TSMC's outsourced CoWoS-S oS packaging by 2025. SPIL
  invested NT$419M in land at Central Taiwan Science Park and NT$3.7B for
  Douliu property; ASE's new Kaohsiung K28 facility (2026) will expand CoWoS
  capacity further.
