description: >-
  Apple locked up 100% of TSMC's first-gen N3 (3nm) capacity for roughly a year
  -- exclusive for A17 Pro (iPhone 15 Pro) and M3 silicon. The Information
  reported Apple negotiated terms where TSMC absorbs the cost of defective dies.
  Apple was ~23% of TSMC's $72B 2022 revenue, making it TSMC's largest customer
  by a wide margin and effectively subsidizing N3 ramp.
