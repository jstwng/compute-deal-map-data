description: >-
  Cerebras and G42 broke ground on Condor Galaxy 3, the third of nine planned
  interconnected AI supercomputers. CG-3 uses 64 Cerebras CS-3 systems powered
  by Wafer-Scale Engine 3 (WSE-3) chips to deliver 8 exaFLOPs of AI compute
  and 58M AI-optimized cores. Available as a cloud service Q2 2024. Part of a
  planned 36 exaFLOP constellation across U.S. sites funded by G42, one of
  Cerebras' anchor customers.
