description: >-
  TSMC signed an MOU to subcontract advanced packaging and test services to
  Amkor's $2B Peoria, Arizona facility, covering TSMC's Integrated Fan-Out
  (InFO) and Chip-on-Wafer-on-Substrate (CoWoS) technologies for common
  customers. The front-end TSMC fab and Amkor's back-end plant are within a
  few miles of each other to accelerate product cycle times for AI chips.
