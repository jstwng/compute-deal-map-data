description: >-
  Omdia projected Foxconn to overtake Dell as the world's largest server
  vendor in 2024, driven by AI server ODM shipments to hyperscalers and its
  close partnership with NVIDIA to manufacture GB200 Blackwell reference
  designs. The four largest cloud providers (Microsoft, Amazon, Google, Meta)
  comprise nearly half of 2024 data-center capex, fueling Foxconn's growth
  alongside Quanta, ZT Systems, and Super Micro.
