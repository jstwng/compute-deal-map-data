description: >-
  Applied Digital signed two 15-year lease agreements with CoreWeave to deliver
  250 MW of critical IT load at its Ellendale, North Dakota HPC campus. The
  first 100 MW data center is targeted ready-for-service in Q4 2025; the second
  is in planning. CoreWeave holds an option for a third 150 MW building expected
  ready-for-service in 2027. Campus is engineered for 400 MW total critical IT
  load.
