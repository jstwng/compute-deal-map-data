description: >-
  NVIDIA announced partnerships with Amkor, Taiwan-based SPIL, and Menlo Micro
  to expand U.S. IC back-end capacity for Blackwell and next-gen AI chips. The
  program leverages Amkor's Peoria, Arizona fab (adjacent to TSMC Arizona)
  for CoWoS-derivative and fan-out flows. Complements NVIDIA's ~80,000
  non-TSMC CoWoS wafer booking with ASE and Amkor out of ~595K total wafers
  for 2026.
