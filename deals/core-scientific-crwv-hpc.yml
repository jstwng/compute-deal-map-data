description: >-
  Core Scientific expanded its 12-year HPC hosting agreement with CoreWeave,
  adding 112 MW on top of a prior 270 MW commitment to reach 382 MW across
  five sites. The expansion alone is expected to add ~$2B to cumulative
  revenue, bringing total projected revenue from CoreWeave contracts to
  ~$6.7B. CoreWeave still holds an option for a further 118 MW.
