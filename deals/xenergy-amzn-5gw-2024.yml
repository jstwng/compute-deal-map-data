description: >-
  Amazon signed an agreement to back the deployment of more than 5 GW of
  X-Energy Xe-100 advanced small modular reactors by 2039, Amazon's largest
  nuclear commitment. Paired with Energy Northwest (Washington State) for up
  to 960 MW at an initial four-pack of Xe-100 reactors on the Columbia
  Generating Station site, plus a Dominion Energy MOU for a 300 MW SMR near
  North Anna Power Station in Virginia.
