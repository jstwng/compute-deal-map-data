description: >-
  Qualcomm signed a six-year long-term foundry capacity agreement with UMC,
  involving multi-billion-dollar capacity reservations and prepayments at UMC's
  mature 14nm/28nm fabs. The deal followed Qualcomm's loss of SMIC access under
  U.S. export controls and was part of a broader set of Qualcomm prepayments to
  lock in supply across Taiwan foundries during the chip shortage.
