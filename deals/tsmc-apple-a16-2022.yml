description: >-
  Apple launched the A16 Bionic (iPhone 14 Pro) on TSMC N4P -- bridging the gap
  between N5 (A14/M1 in 2020) and N3 (A17/M3 in 2023). M2 chip for MacBook Air
  also used a TSMC 5nm variant. TSMC later moved A16 production to Fab 21
  Arizona, making it the first chip manufactured in the US for Apple.
