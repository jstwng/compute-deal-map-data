description: >-
  NVIDIA selected Micron as a primary SOCAMM (System on Chip Advanced Memory
  Module) supplier for 2025, with a planned deployment of 600,000-800,000
  modules for its GB300 "Blackwell" platform and AI PC Digits system. SOCAMMs
  use LPDDR DRAM and offer ~2.5x the bandwidth of a standard server RDIMM
  while reducing size and power by a third. Samsung and SK Hynix also
  co-developed, but Micron got the initial order share.
