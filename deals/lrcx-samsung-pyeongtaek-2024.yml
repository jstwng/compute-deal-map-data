description: >-
  Samsung confirmed equipment procurement for its Pyeongtaek P4 facility to
  bring 6th-generation 10nm-class (1c) DRAM into production, with Lam Research
  supplying critical etch and deposition platforms for NAND and DRAM lines.
  Samsung plans to use 1c DRAM for HBM4 stacks. Equipment installation for the
  P4 DRAM line began in mid-2025 with 1c nanometer DRAM mass production slated
  for 2026.
